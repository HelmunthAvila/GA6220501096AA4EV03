<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>Registrar Movimiento</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/movimiento.css">

</head>

<body>

<div class="container">

<aside class="sidebar">

<div class="logo">
<h2>Amatista</h2>
<span>Shoes</span>
</div>

</aside>

<main class="main">

<h2>Registrar Movimiento</h2>

<form class="form-mov">

<label>Nombre</label>
<select>
<option>Producto A</option>
<option>Producto B</option>
</select>

<label>Referencia</label>
<select>
<option>SKU0001</option>
</select>

<label>Tipo de Movimiento</label>

<div class="tipo">

<label>
<input type="radio" name="tipo">
Entrada (Aumenta Stock)
</label>

<label>
<input type="radio" name="tipo">
Corrección (Manual)
</label>

</div>

<label>Cantidad</label>
<input type="number">

<label>Fecha</label>
<input type="date">

<label>Descripción</label>
<textarea></textarea>

<div class="botones">

<button type="submit" class="guardar">
Registrar
</button>

<button type="button"
onclick="history.back()">
Volver
</button>

</div>

</form>

</main>

</div>

</body>
</html>
