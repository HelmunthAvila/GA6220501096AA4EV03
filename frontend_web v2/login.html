<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amatista SGI - Login</title>

<link rel="stylesheet" href="assets/css/login.css">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <div class="logo">
            <img src="assets/img/logo.png" alt="Amatista">
            <h2>Amatista</h2>
            <span>Shoes</span>
        </div>

        <h3>Bienvenido</h3>

        <p class="subtitle">
            Ingresa tus credenciales para continuar
        </p>

        <form id="loginForm">

            <input 
            type="text" 
            id="usuario" 
            placeholder="Usuario"
            required>

            <input 
            type="password" 
            id="password" 
            placeholder="Contraseña"
            required>

            <div class="options">

                <label>
                    <input type="checkbox">
                    Recordarme
                </label>

                <a href="#">¿Olvidaste tu contraseña?</a>

            </div>

            <button type="submit">
                Ingresar
            </button>

        </form>

    </div>

</div>

<script src="assets/js/login.js"></script>

</body>
</html>
