<!DOCTYPE html>
<html lang="es">

<head>

<!-- Configuración básica del documento y recursos del módulo de ventas -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amatista SGI - Ventas</title>

<link rel="icon" type="image/x-icon" href="img/logo.ico">
<link rel="stylesheet" href="../css/ventas.css">

</head>

<body>

<!-- Contenedor principal del layout del sistema -->
<div class="container">

<!-- MENÚ LATERAL DE NAVEGACIÓN -->
<aside class="sidebar">

<h2>Amatista</h2>

<ul>

<!-- Dashboard: muestra indicadores generales del sistema -->
<li><a href="dashboard.html">Dashboard</a></li>

<!-- Inventario: administración de productos -->
<li><a href="inventario.html">Inventario</a></li>

<!-- Ventas: registro de ventas -->
<li class="active"><a href="ventas.html">Ventas</a></li>

<!-- Reportes: generación de estadísticas -->
<li><a href="reportes.html">Reportes</a></li>

<!-- Usuarios: administración de usuarios -->
<li><a href="usuarios.html">Usuarios</a></li>

</ul>

</aside>


<!-- CONTENIDO PRINCIPAL DEL MÓDULO -->
<main class="main-content">

<h2>Registro de Ventas</h2>


<!-- Contenedor que divide productos disponibles y carrito -->
<div class="ventas-container">


<!-- LISTA DE PRODUCTOS DISPONIBLES -->
<div class="productos">

<h3>Productos disponibles</h3>

<table>

<thead>
<tr>
<th>Producto</th>
<th>Precio</th>
<th>Acción</th>
</tr>
</thead>

<tbody>

<!-- Producto disponible para agregar a la venta -->
<tr>
<td>Teclado</td>
<td>45000</td>
<td><button onclick="agregarProducto('Teclado',45000)">Agregar</button></td>
</tr>

<tr>
<td>Mouse</td>
<td>30000</td>
<td><button onclick="agregarProducto('Mouse',30000)">Agregar</button></td>
</tr>

<tr>
<td>Monitor</td>
<td>600000</td>
<td><button onclick="agregarProducto('Monitor',600000)">Agregar</button></td>
</tr>

</tbody>

</table>

</div>


<!-- CARRITO DE COMPRA PARA LA VENTA -->
<div class="carrito">

<h3>Carrito de venta</h3>

<table>

<thead>
<tr>
<th>Producto</th>
<th>Precio</th>
<th>Eliminar</th>
</tr>
</thead>

<!-- Lista dinámica donde se agregan productos seleccionados -->
<tbody id="listaCarrito">

</tbody>

</table>

<!-- Total acumulado de la venta -->
<h3>Total: $ <span id="total">0</span></h3>

<!-- Botón para registrar la venta en el sistema -->
<button onclick="registrarVenta()">Registrar venta</button>

</div>

</div>

</main>

</div>

<!-- Script que controla la lógica del carrito y registro de ventas -->
<script src="../js/ventas.js"></script>

</body>
</html>
