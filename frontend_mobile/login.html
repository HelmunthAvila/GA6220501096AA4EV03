<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Amatista</title>

<link rel="stylesheet" href="css/mobile.css">
<link rel="stylesheet" href="css/responsive.css">

<script src="js/mobile.js"></script>

</head>

<body>

<div class="login-container">

<div class="login-box">

<img src="img/logo.png" class="logo">

<h2>Bienvenido</h2>

<p class="subtitle">Ingresa tus credenciales para continuar</p>

<input type="text" placeholder="Usuario" class="input">

<input type="password" placeholder="Contraseña" class="input">

<p class="recover">¿Olvidaste tu contraseña?</p>

<button class="btn-login" onclick="login()">Ingresar</button>

</div>

</div>

</body>

</html>
