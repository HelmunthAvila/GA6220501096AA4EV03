<!DOCTYPE html>
<html lang="es">
<head>

<!-- Configuración básica del documento y estilos del formulario -->
<meta charset="UTF-8">

<title>Registrar Movimiento</title>

<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/movimiento.css">

</head>

<body>

<!-- Contenedor principal del layout -->
<div class="container">

<!-- MENÚ LATERAL DEL SISTEMA -->

<aside class="sidebar">

<div class="logo">
<h2>Amatista</h2>
<span>Shoes</span>
</div>

</aside>

<!-- CONTENIDO PRINCIPAL -->

<main class="main">

<!-- Título del formulario -->
<h2>Registrar Movimiento</h2>

<!-- Formulario para registrar movimientos de inventario -->
<form class="form-mov">

<!-- Selección del producto -->
<label>Nombre</label>
<select>
<option>Producto A</option>
<option>Producto B</option>
</select>

<!-- Selección de referencia del producto -->
<label>Referencia</label>
<select>
<option>SKU0001</option>
</select>

<!-- Tipo de movimiento que afecta el inventario -->
<label>Tipo de Movimiento</label>

<div class="tipo">

<label>
<input type="radio" name="tipo">
Entrada (Aumenta Stock)
</label>

<label>
<input type="radio" name="tipo">
Corrección (Manual)
</label>

</div>

<!-- Cantidad de productos que se modificará -->
<label>Cantidad</label>
<input type="number">

<!-- Fecha en que se registra el movimiento -->
<label>Fecha</label>
<input type="date">

<!-- Observaciones del movimiento -->
<label>Descripción</label>
<textarea></textarea>

<!-- Botones de acción del formulario -->
<div class="botones">

<button type="submit" class="guardar">
Registrar
</button>

<button type="button"
onclick="history.back()">
Volver
</button>

</div>

</form>

</main>

</div>

</body>
</html>
